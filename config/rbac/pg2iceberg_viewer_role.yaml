# This rule is not used by the project pg2iceberg-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to replication.pg2iceberg.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pg2iceberg-operator
    app.kubernetes.io/managed-by: kustomize
  name: pg2iceberg-viewer-role
rules:
- apiGroups:
  - replication.pg2iceberg.io
  resources:
  - pg2icebergs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - replication.pg2iceberg.io
  resources:
  - pg2icebergs/status
  verbs:
  - get
